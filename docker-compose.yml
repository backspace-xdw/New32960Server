version: '3.8'
services:
  gb32960-server:
    build: .
    ports:
      - "32960:32960"
    volumes:
      - ./Logs:/app/Logs
      - ./RawData:/app/RawData
      - ./GB32960.Server/appsettings.json:/app/appsettings.json
    restart: unless-stopped

  influxdb:
    image: influxdb:2.7
    ports:
      - "8086:8086"
    volumes:
      - influxdb-data:/var/lib/influxdb2
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=admin12345
      - DOCKER_INFLUXDB_INIT_ORG=xdw
      - DOCKER_INFLUXDB_INIT_BUCKET=gb32960
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=gb32960-server-token

volumes:
  influxdb-data:
